name: Deploy Convex

on:
  push:
    branches:
      - master
    paths:
      - "convex/**"
      - "package.json"
      - "bun.lockb"
      - ".github/workflows/convex-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Convex + Register Webhook
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Deploy to Convex
        run: npx convex deploy --yes
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Sync environment variables to Convex
        run: |
          set -e
          npx convex env set BOT_TOKEN "${{ secrets.BOT_TOKEN }}"
          npx convex env set OWNER_CHAT_ID "${{ secrets.OWNER_CHAT_ID }}"
          npx convex env set AUNT_USERNAME "${{ secrets.AUNT_USERNAME }}"
          npx convex env set GITHUB_TOKEN "${{ secrets.GH_PAT }}"
          npx convex env set GITHUB_OWNER "${{ secrets.GH_OWNER }}"
          npx convex env set GITHUB_REPO "${{ secrets.GH_REPO }}"
          npx convex env set GITHUB_BRANCH "${{ secrets.GH_BRANCH }}"
          npx convex env set CALLBACK_SECRET "${{ secrets.CALLBACK_SECRET }}"
          echo "All environment variables synced."
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Register Telegram webhook
        run: |
          WEBHOOK_URL="${CONVEX_SITE_URL}/telegram-webhook"
          echo "Registering: ${WEBHOOK_URL}"

          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{
              \"url\": \"${WEBHOOK_URL}\",
              \"allowed_updates\": [\"message\", \"callback_query\"],
              \"drop_pending_updates\": true
            }")

          echo "Response: ${RESPONSE}"

          OK=$(echo "${RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('ok', False))")
          if [ "${OK}" != "True" ]; then
            echo "Webhook registration failed"
            exit 1
          fi

          echo "Webhook registered successfully"
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getWebhookInfo"
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
