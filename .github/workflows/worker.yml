name: ZipSender Worker

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Unique job ID from coordinator"
        required: true
      file_id:
        description: "Google Drive file ID"
        required: true
      chat_id:
        description: "Telegram chat ID to report back to"
        required: true
      callback_url:
        description: "Optional HTTP callback URL on your server"
        required: false
        default: ""
      callback_secret:
        description: "Optional secret for callback auth"
        required: false
        default: ""
      aunt_username:
        description: "Telegram user ID or username to send files to"
        required: true

jobs:
  process:
    name: Download → Extract → Rename → Upload
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hour max (GitHub limit)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run worker
        env:
          # ── Passed from workflow_dispatch inputs ──
          INPUT_FILE_ID:         ${{ inputs.file_id }}
          INPUT_CHAT_ID:         ${{ inputs.chat_id }}
          INPUT_JOB_ID:          ${{ inputs.job_id }}
          INPUT_CALLBACK_URL:    ${{ inputs.callback_url }}
          INPUT_CALLBACK_SECRET: ${{ inputs.callback_secret }}
          INPUT_AUNT_USERNAME:   ${{ inputs.aunt_username }}

          # ── Secrets stored in GitHub repo settings ──
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION:  ${{ secrets.TELEGRAM_SESSION }}
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}

        run: node .github/scripts/worker.js
