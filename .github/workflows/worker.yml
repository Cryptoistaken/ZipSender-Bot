name: ZipSender Worker

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Unique job ID from coordinator"
        required: true
      file_id:
        description: "Google Drive file IDs, comma-separated"
        required: true
      chat_id:
        description: "Telegram chat ID to report back to"
        required: true
      msg_id:
        description: "Telegram message ID to edit with progress"
        required: false
        default: ""
      callback_url:
        description: "Optional HTTP callback URL"
        required: false
        default: ""
      callback_secret:
        description: "Optional secret for callback auth"
        required: false
        default: ""
      aunt_username:
        description: "Telegram user ID or username to send files to"
        required: true

jobs:
  process:
    name: Download - Extract - Rename - Upload
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run worker
        env:
          INPUT_FILE_ID:         ${{ inputs.file_id }}
          INPUT_CHAT_ID:         ${{ inputs.chat_id }}
          INPUT_JOB_ID:          ${{ inputs.job_id }}
          INPUT_MSG_ID:          ${{ inputs.msg_id }}
          INPUT_CALLBACK_URL:    ${{ inputs.callback_url }}
          INPUT_CALLBACK_SECRET: ${{ inputs.callback_secret }}
          INPUT_AUNT_USERNAME:   ${{ inputs.aunt_username }}
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION:  ${{ secrets.TELEGRAM_SESSION }}
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}

        run: bun run .github/scripts/worker.js
